<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&amp;family=Inter:wght@400;500;600&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "outline-variant": "#e2bfb0",
              "primary-container": "#ff6b00",
              "on-surface": "#1b1b1c",
              "background": "#fcf9f8",
              "on-primary": "#ffffff",
              "on-secondary-fixed": "#1b1b1c",
              "secondary-container": "#e2dfde",
              "surface-container-low": "#f6f3f2",
              "on-error": "#ffffff",
              "on-tertiary": "#ffffff",
              "on-secondary-fixed-variant": "#474746",
              "on-primary-fixed-variant": "#7a3000",
              "primary": "#a04100",
              "outline": "#8e7164",
              "inverse-on-surface": "#f3f0ef",
              "inverse-surface": "#303030",
              "on-primary-container": "#572000",
              "tertiary-fixed-dim": "#3ce36a",
              "on-tertiary-fixed": "#002108",
              "on-tertiary-container": "#003a13",
              "tertiary-fixed": "#69ff87",
              "on-tertiary-fixed-variant": "#00531e",
              "primary-fixed-dim": "#ffb693",
              "on-background": "#1b1b1c",
              "tertiary-container": "#00b149",
              "on-primary-fixed": "#351000",
              "secondary-fixed-dim": "#c8c6c5",
              "secondary-fixed": "#e5e2e1",
              "surface-container-lowest": "#ffffff",
              "tertiary": "#006e2a",
              "primary-fixed": "#ffdbcc",
              "on-secondary": "#ffffff",
              "surface-tint": "#a04100",
              "surface-container-highest": "#e5e2e1",
              "on-surface-variant": "#5a4136",
              "secondary": "#5f5e5e",
              "inverse-primary": "#ffb693",
              "error-container": "#ffdad6",
              "surface-container": "#f0eded",
              "surface-variant": "#e5e2e1",
              "error": "#ba1a1a",
              "on-secondary-container": "#636262",
              "surface-dim": "#dcd9d9",
              "surface": "#fcf9f8",
              "on-error-container": "#93000a",
              "surface-bright": "#fcf9f8",
              "surface-container-high": "#eae7e7"
            },
            fontFamily: {
              "headline": ["Plus Jakarta Sans"],
              "body": ["Inter"],
              "label": ["Inter"]
            },
            borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
          },
        },
      }
    </script>
<style>
      .material-symbols-outlined {
        font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
      }
      .qr-pattern {
        background-image: radial-gradient(circle at 2px 2px, #1b1b1c 2px, transparent 0);
        background-size: 8px 8px;
      }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background font-body text-on-background min-h-screen flex items-center justify-center p-4 md:p-12">
<!-- Table Stand / Sticker Container -->
<div class="max-w-md w-full bg-surface-container-lowest rounded-[2.5rem] overflow-hidden shadow-2xl shadow-primary/5 flex flex-col items-center relative">
<!-- Brand Header Section (TopAppBar Identity) -->
<header class="w-full flex items-center justify-between px-8 py-8">
<div class="flex items-center gap-3">
<div class="w-10 h-10 rounded-xl bg-primary-container flex items-center justify-center text-on-primary">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">restaurant_menu</span>
</div>
<span class="font-headline text-xl font-bold tracking-tight text-on-surface">MENUZA AI</span>
</div>
<div class="px-4 py-1.5 rounded-full bg-tertiary-container/10 text-tertiary text-xs font-bold tracking-wider">
                POWERED BY AI
            </div>
</header>
<!-- Main Content Canvas -->
<main class="w-full px-8 pb-12 flex flex-col items-center text-center">
<!-- Hero Headline -->
<h1 class="font-headline text-3xl font-extrabold text-on-surface tracking-tight leading-tight mb-4">
                Scan to View Menu <br/>
<span class="text-primary">&amp; Order on WhatsApp</span>
</h1>
<!-- QR Code Section (The Visual Centerpiece) -->
<div class="relative group mt-4">
<!-- Decorative Layered Backgrounds for Depth -->
<div class="absolute inset-0 bg-primary/5 rounded-[2rem] transform rotate-3 scale-105"></div>
<div class="absolute inset-0 bg-surface-container-low rounded-[2rem] transform -rotate-2 scale-105"></div>
<!-- Actual QR Card -->
<div class="relative bg-white p-8 rounded-[2rem] shadow-sm flex items-center justify-center">
<div class="relative w-64 h-64 border-8 border-white">
<!-- Simulated QR Code Pattern -->
<div class="w-full h-full bg-white qr-pattern opacity-90"></div>
<!-- QR Corner Markers (Manual Drawing for Scanner Look) -->
<div class="absolute top-0 left-0 w-16 h-16 border-4 border-on-surface bg-white"></div>
<div class="absolute top-0 right-0 w-16 h-16 border-4 border-on-surface bg-white"></div>
<div class="absolute bottom-0 left-0 w-16 h-16 border-4 border-on-surface bg-white"></div>
<!-- Small Central Restaurant Logo -->
<div class="absolute inset-0 flex items-center justify-center">
<div class="bg-white p-2 rounded-xl shadow-lg border border-surface-container">
<div class="w-12 h-12 bg-on-surface rounded-lg flex items-center justify-center">
<span class="material-symbols-outlined text-white text-3xl">restaurant</span>
</div>
</div>
</div>
</div>
</div>
</div>
<!-- URL Subtext -->
<div class="mt-10 px-6 py-3 rounded-2xl bg-surface-container-low border border-outline-variant/20">
<p class="font-label text-sm font-semibold text-on-surface-variant tracking-wide">
                    https://menuza.ai/r/inkuru-bistro
                </p>
</div>
<!-- Instruction Chips -->
<div class="flex gap-4 mt-8">
<div class="flex flex-col items-center gap-2">
<div class="w-12 h-12 rounded-full bg-surface-container flex items-center justify-center text-primary">
<span class="material-symbols-outlined">photo_camera</span>
</div>
<span class="text-[10px] font-bold text-secondary uppercase tracking-widest">Open Camera</span>
</div>
<div class="flex flex-col items-center gap-2">
<div class="w-12 h-12 rounded-full bg-surface-container flex items-center justify-center text-primary">
<span class="material-symbols-outlined">qr_code_scanner</span>
</div>
<span class="text-[10px] font-bold text-secondary uppercase tracking-widest">Scan Code</span>
</div>
<div class="flex flex-col items-center gap-2">
<div class="w-12 h-12 rounded-full bg-surface-container flex items-center justify-center text-primary">
<span class="material-symbols-outlined">send</span>
</div>
<span class="text-[10px] font-bold text-secondary uppercase tracking-widest">Order Chat</span>
</div>
</div>
</main>
<!-- Bottom Footer Branding (BottomNavBar Logic) -->
<footer class="w-full bg-surface-container-low py-6 px-8 flex justify-between items-center">
<div class="flex items-center gap-2">
<div class="w-2 h-2 rounded-full bg-tertiary"></div>
<span class="font-label text-[11px] font-bold text-on-surface-variant uppercase tracking-[0.2em]">Inkuru Bistro</span>
</div>
<div class="flex items-center gap-4">
<span class="material-symbols-outlined text-on-surface-variant/40 text-lg">wifi</span>
<span class="material-symbols-outlined text-on-surface-variant/40 text-lg">chat</span>
</div>
</footer>
<!-- Decorative Accent -->
<div class="absolute -top-12 -right-12 w-32 h-32 bg-primary-container/10 rounded-full blur-3xl"></div>
<div class="absolute -bottom-12 -left-12 w-32 h-32 bg-tertiary-container/10 rounded-full blur-3xl"></div>
</div>
<!-- Print Hint (Hidden on screen usually, but helpful for physical intent) -->
<div class="fixed top-6 right-6 hidden md:block">
<button class="bg-on-surface text-surface px-6 py-3 rounded-full font-headline font-bold text-sm flex items-center gap-2 hover:bg-primary transition-colors">
<span class="material-symbols-outlined text-sm">print</span>
            Print for Table
        </button>
</div>
</body></html>
